<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="../css/estilosAgrupados.css">
    <title>Torneos - Clash League</title>
</head>

<body class="Principal-css">
<div class="encavezado">
    <div class="boton-hamburguesa">
        <input type="checkbox" id="desplegable">
        <label for="desplegable" class="desplegable">
            <img src="../img/Barras.svg" alt="Menú">
        </label>
        <div class="Panel">
            <a href="GestionJugadores.html"><input class="opciones" type="button" value="GESTIÓN DE JUGADORES"></a>
            <a href="ListaTorneos.html"><input class="opciones" type="button" value="LISTA DE TORNEOS"></a>
            <a href="Clasificaciones.html"><input class="opciones" type="button" value="CLASIFICACIONES"></a>
        </div>
    </div>
    <h1> CLASH LEAGUE </h1>
    <img class="logo" src="../img/image_png.png" alt="Logo">
</div>

<div class="torneos">
    <h2>Torneos Disponibles</h2>

    <div class="participar">
        <form action="Login.html" method="get">
            <div class="torneo">
                <div class="info-lateral izquierda">
                    <label class="icon-ver">
                        <input type="checkbox">
                        <i class="fa-solid fa-eye"></i>
                        <span>VER</span>
                    </label>
                    <div class="copas">
                        <span>5000</span>
                        <i class="fa-solid fa-trophy" style="color: gold;"></i>
                    </div>
                </div>
                <div class="info-princ">
                    <p class="titulo">Sin Legendarias<br><span>1 x 1</span></p>
                    <img src="../img/arena1.png" alt="arena" class="info-img">
                </div>
                <div class="info-lateral derecha">
                    <span>5 / 8</span>
                    <i class="fa-solid fa-people-group"></i>
                </div>
            </div>
            <input type="submit" value="Participar" class="btn">
        </form>
    </div>

    <div class="participar">
        <form action="Login.html" method="get">
            <div class="torneo">
                <div class="info-lateral izquierda">
                    <label class="icon-ver">
                        <input type="checkbox">
                        <i class="fa-solid fa-eye"></i>
                        <span>VER</span>
                    </label>
                    <div class="copas">
                        <span>6000</span>
                        <i class="fa-solid fa-trophy" style="color: gold;"></i>
                    </div>
                </div>
                <div class="info-princ">
                    <p class="titulo">Gigantes vs Pekkas<br><span>1 x 1</span></p>
                    <img src="../img/arena2.png" alt="arena" class="info-img">
                </div>
                <div class="info-lateral derecha">
                    <span>3 / 8</span>
                    <i class="fa-solid fa-people-group"></i>
                </div>
            </div>
            <input type="submit" value="Participar" class="btn">
        </form>
    </div>
</div>

<div class="Botones">
    <a onclick="history.back()"><img src="../img/Volver.svg"></a>
    <a href="Principal.html"><img src="../img/Casa.svg"></a>
    <a onclick="history.forward()"><img src="../img/Siguiente.svg"></a>
</div>
</body>
</html>
