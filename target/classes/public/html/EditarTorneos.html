<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creacion Torneos - Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/estilosAgrupados.css">
</head>

<body class="EditarTorneos-css">
<div class="cabecera">
    <h1>CLASH LEAGUE</h1>
    <img src="../img/image_png.png" id="icono">
</div>

<input type="checkbox" id="desplegable">
<label for="desplegable" class="desplegable">
    <img src="../img/Barras.svg" alt="Menú">
</label>

<div class="Panel">
    <a href="GestionJugadores.html"><div class="opciones">GESTIÓN DE JUGADORES</div></a>
    <a href="ListaTorneos.html"><div class="opciones">LISTA DE TORNEOS</div></a>
    <a href="Clasificaciones.html"><div class="opciones">CLASIFICACIONES</div></a>
</div>

<div class="torneos">
    <h2>TORNEO 1</h2>
    <div class="torneo">
        <div class="info-princ">
            <img src="../img/Arena7.webp" alt="arena" class="info-img">
            <p>ARENA 7</p>
        </div>
        <div class="info-lateral">NÚMERO DE COPAS: 5000 🏆</div>
        <div class="info-lateral">PARTICIPANTES: 8 / 8 👥</div>
    </div>

    <div class="eligir"><h3>ELIGE ARENA:</h3></div>
    <div class="carrusel">
        <div class="contenido-carrusel">
            <div class="carta"><img src="../img/arena5.webp"><p>ARENA 5</p></div>
            <div class="carta"><img src="../img/Arena7.webp"><p>ARENA 7</p></div>
            <div class="carta"><img src="../img/Arena9.webp"><p>ARENA 9</p></div>
        </div>
    </div>

    <div class="form">
        <form>
            <label>CANTIDAD DE JUGADORES:</label>
            <select>
                <option value="4">4</option>
                <option value="8">8</option>
            </select>
            <label>COPAS MÍNIMAS:</label>
            <select>
                <option value="1000">1000</option>
                <option value="5000">5000</option>
            </select>
            <div class="Confirmacion">
                <input type="submit" value="GUARDAR" id="guardar" formaction="CambioArena.html">
                <input type="submit" value="DESCARTAR" id="descartar" formaction="CambioArena.html">
            </div>
        </form>
    </div>
</div>

<div class="Botones">
    <button onclick="history.back()"><img src="../img/Volver.svg"></button>
    <a href="Principal.html"><img src="../img/Casa.svg"></a>
    <a href="Clasificaciones.html"><img src="../img/Siguiente.svg"></a>
</div>
</body>
</html>
