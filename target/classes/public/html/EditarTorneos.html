<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreacionTorneos</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/EditarTorneos.css">
</head>

<body>
    <div class="cabecera">
        <h1>CLASH LEAGUE</h1>
        <img src="../../../../../doc/gui/image_png.png" id="icono">
    </div>

    
    

    <input type="checkbox" id="desplegable">
    <label for="desplegable" class="desplegable">
        <img src="../../../../../doc/gui/Barras.svg" alt="Menú">
    </label>
    <div class="Panel">
        <a href="GestionJugadores.html"><div class="opciones">GESTIÓN DE JUGADORES</div></a>
        <a href="ListaTorneos.html"><div class="opciones">LISTA DE TORNEOS</div></a>
         <ol>
        <a href="t"><div class="opciones">TORNEO 1</div></a>
        <a href="#"><div class="opciones">TORNEO 2</div></a>
        <a href="#"><div class="opciones">TORNEO 3</div></a>
        </ol>
        <a href="Clasificaciones.html"><div class="opciones">CLASIFICACIONES</div></a>
      
    </div>


<div class="torneos">
        <h2>TORNEO 1</h2>
        
        <div class="participar">
            
                <div class="torneo">
                    
                    <div class="info-princ">
                        <img src="../../../../../doc/gui/Arena7.webp" alt="arena" class="info-img">
                        <p>ARENA 7</p>
                    </div>
                    <div class="info-lateral izquierda">
                        <div class="copas">
                            <span>NUMERO DE COPAS: 5000</span>
                            <i class="fa-solid fa-trophy"></i>
                        </div>
                    </div>
                
                    <div class="info-lateral derecha">
                        <span>NUMERO DE PARTICIPANTES: 8 / 8</span>
                        <i class="fa-solid fa-people-group"></i>
                    </div>
                </div>
        </div>
    <div class="eligir">    
    <h3 id="Arena">ELIGE ARENA:</h3>
    </div>
    <div class="carrusel">
        
        <div class="contenido-carrusel">
        
            <div class="carta">
                <img src="../../../../../doc/gui/arena5.webp" alt="arena 5">
                <p>ARENA 5</p>
            </div>

            <div class="carta">
                <img src="../../../../../doc/gui/Arena7.webp" alt="arena 7">
                <p>ARENA 7</p>
            </div>

            <div class="carta">
                <img src="../../../../../doc/gui/Arena9.webp" alt="arena 9">
                <p>ARENA 9</p>
            </div>

        </div>
    </div>

    <div class="form">
        <form>
            <label for="cantidad">CANTIDAD DE JUGADORES:</label>
            <select>
                <option value=""></option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>
            <br><br>
             <label for="nombre" id="nombre" >COPAS MINIMAS:</label>
                <select>
                    <option value=""></option>
                    <option value="1000">1000</option>
                    <option value="2000">2000</option>
                    <option value="3000">3000</option>
                    <option value="4000">4000</option>
                    <option value="5000">5000</option>
                    <option value="6000">6000</option>
                    <option value="7000">7000</option>
                    <option value="8000">8000</option>
                    <option value="9000">9000</option>
                    <option value="10.000">10.000</option>
                </select>

                <br><br>
            <div class="Confirmacion">
               <input type="submit" value="GUARDAR" id="guardar" formaction="CambioArena.html">
                <input type="submit" value="DESCARTAR" id="descartar" formaction="CambioArena.html">
            </div>
        </form>
    </div>
    
     <div class="Botones">
        <button onclick="history.back()"><img src="../../../../../doc/gui/Volver.svg" alt="Volver"></button>
        <a href="Principal.html"><img src="../../../../../doc/gui/Casa.svg" alt="Inicio"></a>
        <a href="Clasificaciones.html"><img src="../../../../../doc/gui/Siguiente.svg" alt="Siguiente"></a>
    </div>
</body>
</html>
