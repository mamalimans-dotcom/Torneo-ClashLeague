<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreacionTorneos - Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/estilosAgrupados.css">
</head>
<body class="CreacionTorneos-css">
<div class="cabecera">
    <h1>CLASH LEAGUE</h1>
    <img src="../img/image_png.png" id="icono">
</div>

<div class="titulos">
    <h2 id="torneo1">TORNEO 1</h2>
    <h2 id="Nuvtorneo">NUEVO TORNEO</h2>
    <h3 id="Arena">ELIGUE ARENA:</h3>
</div>

<input type="checkbox" id="desplegable">
<label for="desplegable" class="desplegable">
    <img src="../img/Barras.svg" alt="Menú">
</label>
<div class="Panel">
    <a href="GestionUsuarios.html"><div class="opciones">GESTIÓN DE JUGADORES</div></a>
    <a href="ListaTorneos.html"><div class="opciones">LISTA DE TORNEOS</div></a>
    <ol>
        <a href="#"><div class="opciones">TORNEO 1</div></a>
    </ol>
    <a href="Clasificaciones.html"><div class="opciones">CLASIFICACIONES</div></a>
</div>

<div class="carrusel">
    <div class="contenido-carrusel">
        <div class="carta">
            <img src="../img/arena5.webp" alt="arena 5">
            <p>ARENA 5</p>
        </div>
        <div class="carta">
            <img src="../img/Arena7.webp" alt="arena 7">
            <p>ARENA 7</p>
        </div>
        <div class="carta">
            <img src="../img/Arena9.webp" alt="arena 9">
            <p>ARENA 9</p>
        </div>
    </div>
</div>

<div class="form">
    <form>
        <label>CANTIDAD DE JUGADORES:</label>
        <select>
            <option value="4">4</option>
            <option value="8">8</option>
        </select>
        <label>COPAS MINIMAS:</label>
        <select>
            <option value="1000">1000</option>
            <option value="5000">5000</option>
        </select>
        <div class="Confirmacion">
            <input type="submit" value="GUARDAR" id="guardar" formaction="CambioArena.html">
            <input type="submit" value="DESCARTAR" id="descartar" formaction="ListaTorneos.html">
        </div>
    </form>
</div>

<div class="Botones">
    <a onclick="history.back()"><img src="../img/Volver.svg" alt="Volver"></a>
    <a href="Login.html"><img src="../img/Casa.svg" alt="Inicio"></a>
    <a href="Clasificaciones.html"><img src="../img/Siguiente.svg" alt="Siguiente"></a>
</div>
</body>
</html>
