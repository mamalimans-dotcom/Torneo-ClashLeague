<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="../css/estilosAgrupados.css">
    <title>Lista de Torneos - Clash League</title>
</head>

<body class="ListaTorneos-css">
<div class="encavezado">
    <div class="boton-hamburguesa">
        <input type="checkbox" id="desplegable">
        <label for="desplegable" class="desplegable">
            <img src="../img/Barras.svg" alt="Menú">
        </label>

        <div class="Panel">
            <a href="GestionUsuarios.html"><input class="opciones" type="button" value="GESTIÓN DE JUGADORES"></a>
            <a href="ListaTorneos.html"><input class="opciones" type="button" value="LISTA DE TORNEOS"></a>
            <a href="Clasificaciones.html"><input class="opciones" type="button" value="CLASIFICACIONES"></a>
        </div>
    </div>
    <h1> CLASH LEAGUE </h1>
    <img class="logo" src="../img/image_png.png" alt="Logo">
</div>

<div class="listaTorneos">
    <h2>Lista de Torneos</h2>

    <div class="torneos">
        <p>TORNEO 1</p>
        <img src="../img/torneo1.png" alt="Torneo 1" class="img-torneo">
        <div class="boton">
            <a href="EditarTorneos.html"><button class="btn"><i class="fa-solid fa-pen-to-square"></i> Editar</button></a>
            <a href="EliminarTorneo.html"><button class="btn"><i class="fa-solid fa-trash"></i> Eliminar</button></a>
        </div>
    </div>

    <div class="torneos">
        <p>TORNEO 2</p>
        <img src="../img/torneo2.png" alt="Torneo 2" class="img-torneo">
        <div class="boton">
            <a href="EditarTorneos.html"><button class="btn"><i class="fa-solid fa-pen-to-square"></i> Editar</button></a>
            <a href="EliminarTorneo.html"><button class="btn"><i class="fa-solid fa-trash"></i> Eliminar</button></a>
        </div>
    </div>

    <a href="CreacionTorneos.html"><button class="btn btn-nuevo"> + Nuevo Torneo</button></a>
</div>

<div class="Botones">
    <a onclick="history.back()"><img src="../img/Volver.svg" alt="Atrás"></a>
    <a href="Principal.html"><img src="../img/Casa.svg" alt="Inicio"></a>
    <a onclick="history.forward()"><img src="../img/Siguiente.svg" alt="Siguiente"></a>
</div>
</body>
</html>
