<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/estilosAgrupados.css">
    <title>Editar Jugador - Local</title>
</head>

<body class="EditarJugador-css">
<div class="encavezado">
    <div class="boton-hamburguesa" id="botonMenu">
        <input type="checkbox" id="desplegable">
        <label for="desplegable" class="desplegable">
            <img src="../img/Barras.svg">
        </label>
        <div class="Panel">
            <a href="GestionUsuarios.html"><input class="opciones" type="button" value="GESTIÓN DE JUGADORES"></a>
            <a href="ListaTorneos.html"><input class="opciones" type="button" value="LISTA DE TORNEOS"></a>
            <a href="Clasificaciones.html"><input class="opciones" type="button" value="CLASIFICACIONES"></a>
        </div>
    </div>
    <h1> CLASH LEAGUE </h1>
    <img class="logo" src="../img/image_png.png" alt="icono">
</div>

<div class="contenedor">
    <h2>Modificar Jugador<br><span>Información de Jugador</span></h2>
    <div class="form">
        <form>
            <label>NOMBRE:</label><br>
            <input type="text" class="usuario1"><br><br>

            <label>ALIAS:</label><br>
            <input type="text" class="usuario1"><br><br>

            <label>EMAIL:</label><br>
            <input type="email" class="usuario1"><br><br>

            <label>CONTRASEÑA:</label><br>
            <input type="password" class="usuario1"><br><br>

            <label>NIVEL:</label>
            <input type="number" class="usuario2">

            <label>COPAS:</label>
            <select>
                <option value="1000">1000</option>
                <option value="2000">2000</option>
                <option value="3000">3000</option>
                <option value="4000">4000</option>
                <option value="5000">5000</option>
                <option value="6000">6000</option>
                <option value="7000">7000</option>
                <option value="8000">8000</option>
                <option value="9000">9000</option>
                <option value="10.000">10.000</option>
            </select><br><br>

            <label>CLAN:</label><br>
            <input type="text" class="usuario1"><br><br>

            <label>ROL:</label>
            <select style="width: 100%;">
                <option value="USUARIO">USUARIO</option>
                <option value="ADMIN">ADMIN</option>
                <option value="MODERADOR">MODERADOR</option>
            </select>
        </form>
        <div class="Confirmacion">
            <a href="CuadroEmergencia.html"><input type="button" value="GUARDAR" id="guardar"></a>
            <a href="GestionUsuarios.html"><input type="button" value="DESCARTAR" id="descartar"></a>
        </div>
    </div>
</div>

<div class="Botones">
    <a href="GestionUsuarios.html"><img src="../img/Volver.svg"></a>
    <a href="Principal.html"><img src="../img/Casa.svg"></a>
    <a href="#"><img src="../img/Siguiente.svg"></a>
</div>
</body>
</html>
