<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="../css/EditarJugador.css">
    <title>Editar Jugador</title>
</head>

<body>
    <div class="encavezado">
        <div class="boton-hamburguesa" id="botonMenu">
            <input type="checkbox" id="desplegable">
            <label for="desplegable" class="desplegable">
                <img src="../../../../../doc/gui/Barras.svg">
            </label>


            <div class="Panel">
                <a href="GestionJugadores.html"><input class="opciones" type="submit" value="GESTION DE JUGADORES"></a>
                <a href=""><input class="opciones" type="submit" value="LISTA DE TORNEOS"></a>
                <a href=""><input class="opciones" type="submit" value="CLASIFICACIONES"></a>
            </div>
        </div>
        <h1> CLASH LEAGUE </h1>
        <img class="logo" src="../../../../../doc/gui/image_png.png" alt="icono">
    </div>
    <!--Edicion de Jugador -->
    <div class="contenedor">
        <h2>Modificar Jugador
            <br>
            <span>Informacion de Jugador</span>
        </h2>
        <div class="form">
            <form>

                <label for="nombre" id="nombre">NOMBRE JUGADOR:</label>
                <br>
                <input type="text" class="usuario1">
                <br><br>
                <label for="nombre" id="nombre">ID:</label>
                <br>
                <input type="number" class="usuario1">

                <br><br>

                <label for="nombre" id="nombre">NIVEL:</label>
                <input type="number" class="usuario2">
                <label for="nombre" id="nombre">COPAS:</label>
                <select>
                    <option value="NUMERO">NUMERO</option>
                    <option value="1000">1000</option>
                    <option value="2000">2000</option>
                    <option value="3000">3000</option>
                    <option value="4000">4000</option>
                    <option value="5000">5000</option>
                    <option value="6000">6000</option>
                    <option value="7000">7000</option>
                    <option value="8000">8000</option>
                    <option value="9000">9000</option>
                    <option value="10.000">10.000</option>
                </select>
                <br><br>
                <label for="nombre" id="nombre">CLAN:</label>
                <br>
                <input type="text" class="usuario1">
                <br><br>
                <label for="nombre" id="nombre">ROL:</label>
                <select>
                    <option value=""></option>
                    <option value="LIDER">LIDER</option>
                    <option value="COMANDANTE">COMANDANTE</option>
                    <option value="SOLDADO">SOLDADO</option>
                </select>
                <br><br>
               
            </form>
             <div class="Confirmacion">
                    <a href="CuadroEmergencia.html"><input type="submit"  value="GUARDAR"  id="guardar"></a>
                    <a href="GestionJugadores.html"><input type="submit" value="DESCARTAR" id="descartar"></a>
                </div>

        </div>
    </div>
    <div class="Botones">
        <a href="GestionJugadores.html"><img src="../../../../../doc/gui/Volver.svg"></a>
        <a href="Principal.html"><img src="../../../../../doc/gui/Casa.svg"></a>
        <a href=""><img src="../../../../../doc/gui/Siguiente.svg"></a>
    </div>
</body>

</html>
